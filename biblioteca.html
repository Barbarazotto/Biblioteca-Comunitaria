<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>   Biblioteca Comunitária </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MENU LATERAL -->
    <div class="menu">

        <h2>Biblioteca</h2>
        <button>Meus Livros</button>
        <button>Meus Pedidos</button>
        <button>Catálogo</button>

    </div>


    <!-- CONTEÚDO PRINCIPAL -->
    <div class="conteudo">

        <!-- TOPO -->
        <div class="topo">

            <h1>Sistema da Biblioteca</h1>
            <div class="pesquisa">
                <input type="text"placeholder="Procurar livros">

            </div>

        </div>


        <!-- LISTA DE LIVROS -->
        <div class="lista-livros">

            <!-- DOM CASMURRO -->
            <div class="livro">
                <img src="https://m.media-amazon.com/images/I/61x1ZHomWUL._SY522_.jpg">
                <h3>Dom Casmurro</h3>
                <div class="status"> Indisponível</div>
                <button class="botao"> Receber aviso </button>
 
            </div>


            <!-- O RATINHO, O MAORANDO VERMELHO MADURO E O GRANDE URSO ESFOMEADO  -->
            <div class="livro">
                <img src="https://acdn-us.mitiendanube.com/stores/002/192/085/products/1000089242-1863169cc71bc485ff17646178249838-1024-1024.webp">
                <h3>O Ratinho, o Morango Vermelho Maduro e o Grande Urso Esfomeado</h3>
                <div class="status"> Disponível </div>
                <button class="botao"> Reservar </button>

            </div>


            <!-- PUNK 57 -->
            <div class="livro">
                <img src="https://m.media-amazon.com/images/I/91KsZkUtV8L._SY522_.jpg">
                <h3> Punk 57 </h3>
                <div class="status"> Disponível</div>
                <button class="botao"> Reservar </button>

            </div>


            <!-- Jojo's Bizarre Adventure Parte 7 Steel Ball Run 02 -->
            <div class="livro">
                <img src="https://http2.mlstatic.com/D_NQ_NP_2X_672194-MLA84362159548_052025-F.webp">
                <h3> Jojo's Bizarre Adventure Parte 7 Steel Ball Run 02 </h3>
                <div class="status"> Disponível </div>
                <button class="botao"> Reservar</button>

            </div>
        </div>
    </div>
</body>
</html>
